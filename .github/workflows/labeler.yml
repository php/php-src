name: "Pull Request Labeler"
on:
  - pull_request_target

permissions:
  contents: read

jobs:
  triage:
    if: github.repository == 'php/php-src'
    permissions:
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@18f1af5e3544586314bbe15c0273249c770b2daf # v6
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
